name: Tapify
options:
  bundleIdPrefix: com.tapify
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  indentWidth: 4
  tabWidth: 4

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGN_IDENTITY: ""

targets:
  Tapify:
    type: application
    platform: macOS
    sources:
      - path: Tapify
        excludes:
          - "**/*.xcloc"
    info:
      path: Tapify/Info.plist
    entitlements:
      path: Tapify/Tapify.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tapify.Tapify
        INFOPLIST_FILE: Tapify/Info.plist
        SWIFT_OBJC_BRIDGING_HEADER: Tapify/HID/Tapify-Bridging-Header.h
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGN_IDENTITY: ""
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - sdk: IOKit.framework
      - sdk: CoreGraphics.framework
      - sdk: CoreAudio.framework
      - sdk: AudioToolbox.framework
      - sdk: AppKit.framework
